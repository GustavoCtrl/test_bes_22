<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Sistema Base V&V</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800 h-screen flex flex-col">

    <nav id="main-nav" class="bg-blue-900 text-white p-4 shadow-md hidden flex justify-between items-center">
        <div class="font-bold text-xl">Task Manager V&V</div>
        <div class="space-x-4">
            <button onclick="navigate('tela-painel')" class="hover:text-blue-300">Painel Principal</button>
            <button onclick="navigate('tela-cadastro')" class="hover:text-blue-300">Nova Tarefa</button>
            <button onclick="navigate('tela-relatorio')" class="hover:text-blue-300">Relatórios</button>
            <button onclick="navigate('tela-login')" class="text-red-400 hover:text-red-300">Sair</button>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6">

        <section id="tela-login" class="w-full max-w-md bg-white rounded-lg shadow-lg p-8">
            <h2 class="text-2xl font-bold mb-6 text-center text-blue-900">Acesso ao Sistema</h2>
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="mb-4">
                    <label class="block text-sm font-semibold mb-2">E-mail</label>
                    <input type="email" required class="w-full border rounded p-2 focus:ring focus:ring-blue-200" placeholder="usuario@uepa.br">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-semibold mb-2">Senha</label>
                    <input type="password" required class="w-full border rounded p-2 focus:ring focus:ring-blue-200" placeholder="••••••••">
                </div>
                <div class="flex flex-col gap-3">
                    <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700 transition">Entrar</button>
                    <button type="button" class="text-sm text-blue-600 hover:underline">Esqueci minha senha</button>
                </div>
            </form>
        </section>

        <section id="tela-painel" class="hidden w-full max-w-6xl h-full flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-slate-700">Quadro de Tarefas</h2>
                <div class="space-x-2">
                    <select class="border p-2 rounded text-sm"><option>Filtrar por Responsável</option></select>
                    <select class="border p-2 rounded text-sm"><option>Ordenar por Prazo</option></select>
                </div>
            </div>
            
            <div class="flex flex-col md:flex-row gap-6 flex-grow">
                <div class="flex-1 bg-white p-4 rounded-lg shadow border-t-4 border-slate-400">
                    <h3 class="font-bold text-slate-600 mb-4">Pendente</h3>
                    <div id="col-pendente" class="space-y-3"></div>
                </div>
                <div class="flex-1 bg-white p-4 rounded-lg shadow border-t-4 border-blue-500">
                    <h3 class="font-bold text-blue-600 mb-4">Em Andamento</h3>
                    <div id="col-andamento" class="space-y-3"></div>
                </div>
                <div class="flex-1 bg-white p-4 rounded-lg shadow border-t-4 border-green-500">
                    <h3 class="font-bold text-green-600 mb-4">Concluída</h3>
                    <div id="col-concluida" class="space-y-3"></div>
                </div>
            </div>
        </section>

        <section id="tela-cadastro" class="hidden w-full max-w-2xl bg-white rounded-lg shadow-lg p-8">
            <h2 class="text-2xl font-bold mb-6 text-slate-700">Cadastrar Nova Tarefa</h2>
            <form id="task-form" onsubmit="handleTaskSubmit(event)">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-semibold mb-1">Título da Tarefa <span class="text-red-500">*</span></label>
                        <input type="text" id="task-title" required class="w-full border border-slate-300 rounded p-2 focus:ring focus:ring-blue-200">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-semibold mb-1">Descrição</label>
                        <textarea id="task-desc" rows="3" class="w-full border border-slate-300 rounded p-2 focus:ring focus:ring-blue-200"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Prazo <span class="text-red-500">*</span></label>
                        <input type="date" id="task-date" required class="w-full border border-slate-300 rounded p-2 focus:ring focus:ring-blue-200">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Prioridade</label>
                        <select id="task-priority" class="w-full border border-slate-300 rounded p-2 focus:ring focus:ring-blue-200">
                            <option value="baixa">Baixa</option>
                            <option value="media">Média</option>
                            <option value="alta">Alta</option>
                        </select>
                    </div>
                </div>
                <div id="error-feedback" class="hidden mb-4 p-3 bg-red-100 text-red-700 rounded text-sm font-semibold border border-red-200">
                    </div>
                <div class="flex justify-end gap-3 mt-6">
                    <button type="button" onclick="navigate('tela-painel')" class="bg-slate-200 px-4 py-2 rounded hover:bg-slate-300">Cancelar</button>
                    <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 font-bold">Salvar Tarefa</button>
                </div>
            </form>
        </section>

        <section id="tela-relatorio" class="hidden w-full max-w-4xl bg-white rounded-lg shadow-lg p-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-slate-700">Relatório de Produtividade</h2>
                <div class="space-x-2">
                    <button class="bg-red-50 text-red-600 border border-red-200 px-3 py-1 rounded hover:bg-red-100 text-sm font-semibold">⬇ PDF</button>
                    <button class="bg-green-50 text-green-700 border border-green-200 px-3 py-1 rounded hover:bg-green-100 text-sm font-semibold">⬇ CSV</button>
                </div>
            </div>
            
            <div class="bg-slate-50 border rounded-lg p-4 mb-6 grid grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">Período</label>
                    <input type="month" class="w-full border p-1 rounded text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">Responsável</label>
                    <select class="w-full border p-1 rounded text-sm"><option>Todos</option></select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">Prioridade</label>
                    <select class="w-full border p-1 rounded text-sm"><option>Todas</option></select>
                </div>
            </div>

            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-100 border-b">
                        <th class="p-3 font-semibold text-sm">ID</th>
                        <th class="p-3 font-semibold text-sm">Título</th>
                        <th class="p-3 font-semibold text-sm">Responsável</th>
                        <th class="p-3 font-semibold text-sm">Status</th>
                    </tr>
                </thead>
                <tbody id="report-table-body">
                    </tbody>
            </table>
        </section>

    </main>

    <script>
        // Estrutura JSON base para integração de dados
        const taskDatabase = {
            "tasks": [
                { "id": "REQ-01", "title": "Modelar Banco de Dados", "assignee": "João Gabriel", "status": "pendente", "priority": "alta" },
                { "id": "DEV-02", "title": "Implementar JWT", "assignee": "Nicollas Avila", "status": "andamento", "priority": "alta" },
                { "id": "TST-03", "title": "Casos de Teste (Valores Limite)", "assignee": "QA Team", "status": "concluida", "priority": "media" }
            ]
        };

        // Navegação entre telas
        function navigate(screenId) {
            const screens = ['tela-login', 'tela-painel', 'tela-cadastro', 'tela-relatorio'];
            screens.forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
            
            const nav = document.getElementById('main-nav');
            screenId === 'tela-login' ? nav.classList.add('hidden') : nav.classList.remove('hidden');

            if (screenId === 'tela-painel') renderBoard();
            if (screenId === 'tela-relatorio') renderReport();
        }

        // Simulação de Login
        function handleLogin(e) {
            e.preventDefault();
            navigate('tela-painel');
        }

        // Validação e Submissão de Tarefa
        function handleTaskSubmit(e) {
            e.preventDefault();
            const dateInput = document.getElementById('task-date').value;
            const errorBox = document.getElementById('error-feedback');
            
            // Simulação de regra de negócio: Data não pode ser no passado
            const today = new Date().toISOString().split('T')[0];
            if (dateInput < today) {
                errorBox.textContent = "Erro de Validação: O prazo não pode ser uma data retroativa.";
                errorBox.classList.remove('hidden');
                return;
            }
            
            errorBox.classList.add('hidden');
            alert("Sucesso! Tarefa persistida no formato JSON interno.");
            document.getElementById('task-form').reset();
            navigate('tela-painel');
        }

        // Renderização Dinâmica do Quadro
        function renderBoard() {
            const cols = { pendente: '', andamento: '', concluida: '' };
            
            taskDatabase.tasks.forEach(t => {
                const card = `
                    <div class="border rounded p-3 bg-slate-50 text-sm shadow-sm cursor-pointer hover:bg-slate-100">
                        <div class="font-bold text-xs text-slate-400 mb-1">${t.id}</div>
                        <div class="font-semibold mb-2">${t.title}</div>
                        <div class="flex justify-between items-center text-xs">
                            <span class="bg-slate-200 px-2 py-1 rounded">${t.assignee}</span>
                            <span class="text-${t.priority === 'alta' ? 'red' : 'blue'}-500 font-bold capitalize">${t.priority}</span>
                        </div>
                    </div>`;
                if(cols[t.status] !== undefined) cols[t.status] += card;
            });

            document.getElementById('col-pendente').innerHTML = cols.pendente;
            document.getElementById('col-andamento').innerHTML = cols.andamento;
            document.getElementById('col-concluida').innerHTML = cols.concluida;
        }

        // Renderização Dinâmica do Relatório
        function renderReport() {
            const tbody = document.getElementById('report-table-body');
            tbody.innerHTML = taskDatabase.tasks.map(t => `
                <tr class="border-b hover:bg-slate-50">
                    <td class="p-3 text-sm text-slate-500">${t.id}</td>
                    <td class="p-3 text-sm font-semibold">${t.title}</td>
                    <td class="p-3 text-sm">${t.assignee}</td>
                    <td class="p-3 text-sm capitalize">${t.status}</td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
